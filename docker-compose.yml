services:

  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: pf-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: pfuser
      MONGO_INITDB_ROOT_PASSWORD: pfpass123
      MONGO_INITDB_DATABASE: personalfinance
    volumes:
      - mongodb_data:/data/db
      - ./deploy/mongodb-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - pf-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pf-backend
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://pfuser:pfpass123@mongodb:27017/personalfinance?authSource=personalfinance
      MONGODB_DB: personalfinance
      CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
    ports:
      - "8000:8000"
    volumes:
      - exports_data:/app/exports
    depends_on:
      - mongodb
    networks:
      - pf-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pf-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pf-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pf-network

volumes:
  mongodb_data:
  exports_data:

networks:
  pf-network:
    driver: bridge
